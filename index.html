<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기상청 날씨 달력 빌더</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .builder-card { background: white; border-radius: 15px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .key-input-area { background: #e9ecef; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 2px dashed #ced4da; }
        .preview-box { background: #fff; border: 1px solid #dee2e6; border-radius: 12px; padding: 20px; min-height: 250px; }
        .code-area { background: #212529; color: #ced4da; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; }
        .weather-card { border-left: 5px solid #0d6efd; background: #fdfdfd; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">🌤️ 날씨 달력 실시간 생성기</h1>
        <p class="text-muted">본인의 API 키를 사용하여 실제 예보 데이터를 확인하고 코드를 생성하세요.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="key-input-area text-center">
                <h5 class="fw-bold mb-3">🔑 기상청 API 키 입력</h5>
                <p class="small text-danger mb-3">※ 입력하신 키는 브라우저 메모리에만 임시 저장되며, 창을 닫으면 즉시 파기됩니다.</p>
                <div class="input-group mb-2" style="max-width: 600px; margin: 0 auto;">
                    <input type="password" id="userApiKey" class="form-control" placeholder="기상청 인증키(Decoding)를 입력하세요">
                    <button class="btn btn-primary" onclick="fetchRealtimeWeather()">데이터 불러오기</button>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-5">
                    <div class="builder-card p-4 h-100">
                        <h6 class="fw-bold mb-3">📍 지역 설정</h6>
                        <select class="form-select mb-4" id="regSel" onchange="fetchRealtimeWeather()">
                            <option value="60,127,11B10101,11B00000,서울 중랑구">서울 중랑구</option>
                            <option value="98,76,11H20201,11H20000,부산 해운대">부산 해운대</option>
                            <option value="89,90,11H10701,11H10000,대구 중구">대구 중구</option>
                            <option value="63,89,11H10501,11H10000,대전 중구">대전 중구</option>
                        </select>
                        
                        <h6 class="fw-bold mb-2">💻 복사할 코드 (Python)</h6>
                        <div class="code-area mb-3" id="codeOut">지역을 선택하세요...</div>
                        <button class="btn btn-outline-dark btn-sm w-100" onclick="copyCode()">코드 복사하기</button>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="builder-card p-4 h-100">
                        <h6 class="fw-bold mb-3">👀 실시간 미리보기 (오늘)</h6>
                        <div id="loading" class="text-center d-none py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">데이터 수신 중...</p>
                        </div>
                        <div id="previewArea" class="preview-box">
                            <p class="text-center text-muted pt-5">API 키를 입력하고 버튼을 눌러주세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function fetchRealtimeWeather() {
        const apiKey = document.getElementById('userApiKey').value.trim();
        if (!apiKey) {
            alert("API 키를 먼저 입력해주세요!");
            return;
        }

        const val = document.getElementById('regSel').value.split(',');
        const [nx, ny, tId, lId, name] = val;

        // 코드 출력 업데이트
        document.getElementById('codeOut').innerText = `NX, NY = ${nx}, ${ny}\nLOCATION_NAME = "${name}"\nREG_ID_TEMP = '${tId}'\nREG_ID_LAND = '${lId}'`;

        const area = document.getElementById('previewArea');
        const loader = document.getElementById('loading');
        
        loader.classList.remove('d-none');
        area.classList.add('d-none');

        // 오늘 날짜 및 시간 설정 (08시 기준 예시)
        const now = new Date();
        const baseDate = now.toISOString().split('T')[0].replace(/-/g, '');
        const baseTime = "0200"; // 가장 안정적인 새벽 예보 데이터

        const url = `https://apihub.kma.go.kr/api/typ02/openApi/VilageFcstInfoService_2.0/getVilageFcst?dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${nx}&ny=${ny}&numOfRows=300&authKey=${apiKey}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if (data.response.header.resultCode !== "00") {
                throw new Error(data.response.header.resultMsg);
            }

            const items = data.response.body.items.item;
            const todayItems = items.filter(i => i.fcstDate === baseDate);
            
            const hourly = {};
            todayItems.forEach(i => {
                if(!hourly[i.fcstTime]) hourly[i.fcstTime] = {};
                hourly[i.fcstTime][i.category] = i.fcstValue;
            });

            let html = `<div class="weather-card"><p class="fw-bold">📍 ${name} 실시간 예보</p><div style="font-size:0.8rem;">`;
            Object.keys(hourly).sort().forEach(t => {
                const h = hourly[t];
                html += `<div>[${parseInt(t.slice(0,2))}시] 🌡️ ${h.TMP}°C (☔${h.POP}% 💧${h.REH}% 💨${h.WSD}m/s)</div>`;
            });
            html += `</div></div>`;
            area.innerHTML = html;

        } catch (e) {
            area.innerHTML = `<div class="alert alert-danger">에러: ${e.message}<br><small>키가 올바른지, 혹은 활용신청이 승인되었는지 확인하세요.</small></div>`;
        } finally {
            loader.classList.add('d-none');
            area.classList.remove('d-none');
        }
    }

    function copyCode() {
        const text = document.getElementById('codeOut').innerText;
        navigator.clipboard.writeText(text);
        alert("코드가 복사되었습니다!");
    }
</script>

</body>
</html>
